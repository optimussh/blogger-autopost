name: Daily shortcut2whealthy Auto Post

on:
  schedule:
    # 한국 시간(KST) 기준 설정
    - cron: '0 22 * * *'   # 22:00 UTC = 다음날 07:00 KST
    - cron: '0 3 * * *'    # 03:00 UTC = 12:00 KST
    - cron: '0 10 * * *'   # 10:00 UTC = 19:00 KST
  workflow_dispatch:      # 수동 실행 가능

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: Generate & Publish Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          G_CLIENT_ID: ${{ secrets.G_CLIENT_ID }}
          G_CLIENT_SECRET: ${{ secrets.G_CLIENT_SECRET }}
          G_REFRESH_TOKEN: ${{ secrets.G_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: python main.py

      - name: Logging
        run: echo "📅 작업 완료 시간 - $(date)"
